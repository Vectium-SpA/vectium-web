<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 24px 26px; }
  .big { font-size: 58px; font-weight: 700; color: var(--gray-dark); letter-spacing: -1px; line-height: 1; }
  .stack { font-size: 12px; color: var(--gray-mid); margin-top: 10px; }
  .weights { display: flex; gap: 22px; margin-top: 20px; align-items: baseline; }
  .weights span { font-size: 24px; color: var(--gray-dark); }
  .weights small { display:block; font-size: 10px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 400; }
</style>
</head>
<body>
  <div class="big">Aa Bb Cc 123</div>
  <div class="stack">SF&nbsp;Pro&nbsp;Display (iOS) · Roboto (Android) · system-ui / Inter (Web)</div>
  <div class="weights">
    <div><span style="font-weight:400">Regular</span><small>400</small></div>
    <div><span style="font-weight:500">Medium</span><small>500</small></div>
    <div><span style="font-weight:600">Semibold</span><small>600</small></div>
    <div><span style="font-weight:700">Bold</span><small>700</small></div>
  </div>
</body>
</html>
