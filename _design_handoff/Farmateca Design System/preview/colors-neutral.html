<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--r-m); overflow: hidden; box-shadow: var(--shadow-xs); border: 1px solid rgba(0,0,0,0.04); }
  .chip { height: 64px; }
  .meta { padding: 7px 9px; background: var(--white); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg1); }
  .hex { font-size: 10px; color: var(--fg3); font-variant-numeric: tabular-nums; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#43464c"></div><div class="meta"><div class="name">Dark Gray</div><div class="hex">#43464c</div></div></div>
    <div class="sw"><div class="chip" style="background:#5d6067"></div><div class="meta"><div class="name">Medium</div><div class="hex">#5d6067</div></div></div>
    <div class="sw"><div class="chip" style="background:#7f828a"></div><div class="meta"><div class="name">Mid</div><div class="hex">#7f828a</div></div></div>
    <div class="sw"><div class="chip" style="background:#9fa2a9"></div><div class="meta"><div class="name">Light</div><div class="hex">#9fa2a9</div></div></div>
    <div class="sw"><div class="chip" style="background:#dcdee2"></div><div class="meta"><div class="name">Ultra Light</div><div class="hex">#dcdee2</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border-bottom:1px solid #eee"></div><div class="meta"><div class="name">White</div><div class="hex">#ffffff</div></div></div>
  </div>
</body>
</html>
