<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 26px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--primary); border-radius: 4px; height: 20px; }
  .lbl { font-size: 11px; font-weight: 600; color: var(--fg1); margin-top: 8px; }
  .val { font-size: 10px; color: var(--gray-light); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="lbl">XS</div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="lbl">S</div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="lbl">M</div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="lbl">L</div><div class="val">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="lbl">XL</div><div class="val">32</div></div>
  </div>
</body>
</html>
