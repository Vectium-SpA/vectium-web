<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 22px; display:flex; flex-direction:column; gap:12px; }
  .plan { display:flex; align-items:center; gap:14px; padding:16px; border-radius:14px; border:1.5px solid var(--gray-ultra); background:#fff; }
  .plan.sel { border:2px solid var(--primary-dark); background: var(--tint-active); padding:15px; }
  .radio { width:22px; height:22px; border-radius:50%; border:2px solid var(--gray-light); flex:none; display:flex; align-items:center; justify-content:center; }
  .plan.sel .radio { border-color: var(--primary-dark); }
  .dot { width:12px; height:12px; border-radius:50%; background: var(--primary-dark); }
  .label { font-size:15px; font-weight:600; color: var(--gray-dark); display:flex; align-items:center; gap:8px; }
  .plan.sel .label { color: var(--primary-dark); }
  .pop { background: var(--primary-dark); color:#fff; font-size:9px; font-weight:700; padding:2px 8px; border-radius:6px; letter-spacing:.8px; }
  .sub { font-size:11px; color: var(--gray-mid); margin-top:2px; }
  .price { margin-left:auto; text-align:right; }
  .price .m { font-size:20px; font-weight:800; color: var(--primary-dark); }
  .price .pl { font-size:11px; color: var(--gray-mid); }
</style>
</head>
<body>
  <div class="plan sel">
    <div class="radio"><div class="dot"></div></div>
    <div><div class="label">Anual <span class="pop">MÁS POPULAR</span></div><div class="sub">$2.916/mes · equivalente mensual</div></div>
    <div class="price"><div class="m">$34.990</div><div class="pl">al año</div></div>
  </div>
  <div class="plan">
    <div class="radio"></div>
    <div><div class="label">Mensual</div></div>
    <div class="price"><div class="m">$3.490</div><div class="pl">al mes</div></div>
  </div>
</body>
</html>
