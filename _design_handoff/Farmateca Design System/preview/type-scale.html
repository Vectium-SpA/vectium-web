<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); padding: 24px 26px; }
  .spec { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { width: 88px; flex: none; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--gray-light); padding-top: 4px; }
</style>
</head>
<body>
  <div class="spec">
    <div class="line"><span class="tag">Hero 32</span><span style="font:700 32px/1.15 var(--font-sans);color:var(--primary-dark);letter-spacing:-.5px">Farmateca</span></div>
    <div class="line"><span class="tag">Title 28</span><span style="font:700 28px/1.2 var(--font-sans);color:var(--gray-dark)">¿Qué deseas buscar?</span></div>
    <div class="line"><span class="tag">Section 20</span><span style="font:600 20px/1.3 var(--font-sans);color:var(--gray-dark)">Marcas Comerciales</span></div>
    <div class="line"><span class="tag">Card 18</span><span style="font:600 18px/1.3 var(--font-sans);color:var(--gray-dark)">Paracetamol</span></div>
    <div class="line"><span class="tag">Body 16</span><span style="font:400 16px/1.5 var(--font-sans);color:var(--gray-dark)">Información farmacológica completa</span></div>
    <div class="line"><span class="tag">Small 14</span><span style="font:400 14px/1.5 var(--font-sans);color:var(--gray-medium)">Busca por nombre comercial o compuesto</span></div>
    <div class="line"><span class="tag">Caption 12</span><span style="font:500 12px/1.4 var(--font-sans);color:var(--gray-mid)">PRÓXIMAMENTE</span></div>
  </div>
</body>
</html>
