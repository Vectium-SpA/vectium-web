<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-light); padding: 24px; display:flex; flex-direction:column; gap:16px; }
  .msr { font-family: 'Material Symbols Rounded'; line-height: 1; }
  .field { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow-xs); }
  .field .msr { font-size: 22px; color: var(--primary-dark); }
  .field input { border: none; outline: none; font-family: inherit; font-size: 16px; color: var(--gray-dark); flex: 1; background: none; }
  .field input::placeholder { color: var(--gray-light); }
  .focused { border: 2px solid var(--primary); padding: 12px 14px; }
  .label { font-size: 11px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: -6px; }
</style>
</head>
<body>
  <div class="label">Default</div>
  <div class="field"><span class="msr">search</span><input placeholder="Escribe para buscar..." value=""></div>
  <div class="label">Focused · con valor</div>
  <div class="field focused"><span class="msr">search</span><input value="Paracetamol"><span class="msr" style="color:var(--primary-dark);cursor:pointer">close</span></div>
</body>
</html>
