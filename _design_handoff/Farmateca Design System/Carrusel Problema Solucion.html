<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrusel Problema → Solución · Farmateca</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: #0a0f14; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── TOOLBAR ── */
    .toolbar { height: 50px; background: rgba(255,255,255,.05); border-bottom: 1px solid rgba(255,255,255,.09); display: flex; align-items: center; padding: 0 18px; gap: 12px; flex-shrink: 0; }
    .tb-logo { height: 22px; opacity: .8; filter: brightness(0) invert(1); }
    .tb-sep { width: 1px; height: 18px; background: rgba(255,255,255,.14); }
    .tb-title { font-size: 13px; font-weight: 600; opacity: .65; }
    .tb-slide-count { font-size: 11px; font-weight: 700; color: var(--primary); margin-left: 4px; }
    .tb-badge { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; background: rgba(30,157,185,.3); color: #b4e5f4; margin-left: auto; }
    .tb-nav { display: flex; gap: 6px; margin-left: 8px; }
    .tb-nav button { width: 28px; height: 28px; border-radius: 7px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .tb-nav button:hover { background: rgba(30,157,185,.3); }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── PANEL ── */
    .panel { width: 300px; flex-shrink: 0; background: rgba(255,255,255,.035); border-right: 1px solid rgba(255,255,255,.08); overflow-y: auto; display: flex; flex-direction: column; }
    .thumbs { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px; border-bottom: 1px solid rgba(255,255,255,.07); }
    .thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, opacity .15s; opacity: .6; position: relative; }
    .thumb.active { border-color: var(--primary); opacity: 1; }
    .thumb:hover { opacity: .9; }
    .thumb-n { position: absolute; top: 4px; left: 5px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,.7); }
    .edit-area { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .p-section { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.35); }
    .p-slide-name { font-size: 13px; font-weight: 700; color: white; margin-bottom: 4px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .f-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.50); }
    .field input, .field textarea { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.11); border-radius: 7px; color: white; font-family: var(--font-sans); font-size: 12px; padding: 7px 10px; outline: none; transition: border-color .2s; resize: none; }
    .field input:focus, .field textarea:focus { border-color: var(--primary); background: rgba(30,157,185,.1); }
    .field textarea { min-height: 72px; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,.07); }
    .export-note { background: rgba(255,184,0,.07); border: 1px solid rgba(255,184,0,.18); border-radius: 8px; padding: 11px 12px; font-size: 11px; color: rgba(255,184,0,.8); line-height: 1.55; }

    /* ── STAGE ── */
    .stage { flex: 1; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 20px; background: #080d11; }
    .canvas-wrap { position: relative; flex-shrink: 0; }

    /* ═══════════════════════════════
       SLIDE CANVAS — 1080 × 1080
    ═══════════════════════════════ */
    .slide-canvas {
      width: 1080px; height: 1080px;
      position: absolute; top: 0; left: 0;
      transform-origin: top left;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── SLIDE 1: HOOK (white) ── */
    .s-hook {
      background: white;
      padding: 72px 80px;
      justify-content: space-between;
    }
    .s-hook .slide-toprow { display: flex; justify-content: space-between; align-items: flex-start; }
    .s-hook .slide-num { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
    .s-hook .slide-logo-sm { height: 32px; opacity: .5; }
    .s-hook .slide-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; padding: 40px 0; }
    .s-hook .sh-title { font-size: 100px; font-weight: 700; color: #1a1a1a; line-height: 1.05; letter-spacing: -2px; text-wrap: pretty; }
    .s-hook .sh-sub { font-size: 44px; color: #5d6067; line-height: 1.4; }
    .s-hook .slide-bottom { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    .swipe-hint { font-size: 26px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 8px; }

    /* ── SLIDE 2: PROBLEMA (gray) ── */
    .s-problema {
      background: #f0f2f5;
      padding: 72px 80px;
      justify-content: space-between;
    }
    .s-problema .slide-toprow { display: flex; justify-content: space-between; align-items: center; }
    .s-problema .slide-num { font-size: 18px; font-weight: 700; color: #9fa2a9; letter-spacing: 1px; }
    .s-problema .slide-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; padding: 40px 0; }
    .x-icon { width: 80px; height: 80px; border-radius: 20px; background: rgba(239,68,68,.12); display: flex; align-items: center; justify-content: center; }
    .x-icon svg { width: 44px; height: 44px; }
    .s-problema .sp-title { font-size: 76px; font-weight: 700; color: #1a1a1a; line-height: 1.1; letter-spacing: -1.5px; text-wrap: pretty; }
    .s-problema .sp-body { font-size: 38px; color: #5d6067; line-height: 1.5; }

    /* ── SLIDE 3: AGRAVANTE (soft teal gradient) ── */
    .s-agravante {
      background: linear-gradient(135deg, #e8f7fc, #f5fbfe);
      padding: 72px 80px;
      justify-content: space-between;
    }
    .s-agravante .slide-toprow { display: flex; justify-content: space-between; }
    .s-agravante .slide-num { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
    .s-agravante .slide-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; padding: 40px 0; }
    .s-agravante .sa-title { font-size: 72px; font-weight: 700; color: #147790; line-height: 1.1; letter-spacing: -1.5px; text-wrap: pretty; }
    .s-agravante .sa-body { font-size: 38px; color: var(--primary-dark); line-height: 1.5; }
    .s-agravante .sa-question { font-size: 36px; font-style: italic; color: var(--primary); margin-top: 8px; }

    /* ── SLIDE 4: SOLUCIÓN (hero teal) ── */
    .s-solucion {
      background: linear-gradient(150deg, #147790 0%, #1e9db9 50%, #27c2d1 100%);
      padding: 72px 80px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .s-solucion .slide-toprow { display: flex; justify-content: space-between; width: 100%; }
    .s-solucion .slide-num { font-size: 18px; font-weight: 700; color: rgba(255,255,255,.5); }
    .s-solucion .slide-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 32px; padding: 40px 0; width: 100%; }
    .check-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center; }
    .check-icon svg { width: 46px; height: 46px; }
    .s-solucion .ss-title { font-size: 84px; font-weight: 700; color: white; line-height: 1.1; letter-spacing: -2px; text-wrap: pretty; }
    .s-solucion .ss-body { font-size: 40px; color: rgba(255,255,255,.82); line-height: 1.4; }

    /* ── SLIDE 5: STATS (white) ── */
    .s-stats {
      background: white;
      padding: 64px 80px;
      justify-content: space-between;
    }
    .s-stats .slide-toprow { display: flex; justify-content: space-between; align-items: center; }
    .s-stats .slide-num { font-size: 18px; font-weight: 700; color: var(--primary); }
    .s-stats .stats-title { font-size: 52px; font-weight: 700; color: var(--primary-dark); letter-spacing: -.5px; margin-top: 28px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; align-content: center; margin: 28px 0; }
    .stat-item { background: #f5f7fa; border-radius: 20px; padding: 28px 24px; }
    .stat-val { font-size: 60px; font-weight: 700; color: var(--primary); line-height: 1; letter-spacing: -1.5px; }
    .stat-label { font-size: 26px; color: #5d6067; margin-top: 6px; line-height: 1.3; }
    .stats-cite { font-size: 22px; font-style: italic; color: #9fa2a9; }

    /* ── SLIDE 6: CTA (hero teal) ── */
    .s-cta {
      background: linear-gradient(150deg, #147790 0%, #1e9db9 50%, #27c2d1 100%);
      padding: 72px 80px;
      align-items: center;
      justify-content: space-between;
      text-align: center;
    }
    .s-cta .slide-logo-big { height: 60px; filter: brightness(0) invert(1); opacity: .9; }
    .s-cta .cta-center { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .s-cta .cta-title { font-size: 84px; font-weight: 700; color: white; line-height: 1.1; letter-spacing: -2px; }
    .s-cta .cta-sub { font-size: 46px; color: rgba(255,255,255,.82); }
    .badges { display: flex; gap: 20px; justify-content: center; }
    .badge-img { height: 72px; opacity: .9; filter: brightness(0) invert(1); }
    .s-cta .cta-legal { font-size: 22px; color: rgba(255,255,255,.38); line-height: 1.4; text-align: center; }

    /* ── THUMBNAIL RENDERING ── */
    .thumb-hook { background: white; }
    .thumb-problema { background: #f0f2f5; }
    .thumb-agravante { background: linear-gradient(135deg,#e8f7fc,#f5fbfe); }
    .thumb-solucion { background: linear-gradient(150deg,#147790,#1e9db9,#27c2d1); }
    .thumb-stats { background: white; }
    .thumb-cta { background: linear-gradient(150deg,#147790,#1e9db9,#27c2d1); }

    .panel::-webkit-scrollbar { width: 4px; } .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
  </style>
</head>
<body>

<div class="toolbar">
  <img class="tb-logo" src="assets/logo-full.png" alt="Farmateca">
  <div class="tb-sep"></div>
  <div class="tb-title">Carrusel Problema → Solución</div>
  <span class="tb-slide-count" id="tb-count">Slide 1 / 6</span>
  <div class="tb-nav">
    <button onclick="navigate(-1)" title="Anterior">‹</button>
    <button onclick="navigate(1)" title="Siguiente">›</button>
  </div>
  <div class="tb-badge">1080 × 1080 · 6 Slides</div>
</div>

<div class="main">

  <!-- ── PANEL ── -->
  <aside class="panel">
    <div class="thumbs" id="thumbs"></div>
    <div class="edit-area" id="edit-area">
      <!-- Dynamic edit fields injected by JS -->
    </div>
  </aside>

  <!-- ── STAGE ── -->
  <main class="stage" id="stage">
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="slide-canvas" id="canvas"></div>
    </div>
  </main>

</div>

<script>
  // ── SLIDE DATA ────────────────────────────────────────────────────────────────
  const SLIDES = [
    {
      type: 'hook',
      name: 'Hook · Dolor',
      title: 'Estás en la guardia.',
      subtitle: 'El paciente necesita un medicamento urgente. No tienes señal. ¿Ahora qué?',
    },
    {
      type: 'problema',
      name: 'Problema',
      title: 'Los buscadores en línea no sirven aquí.',
      body: 'Google da información genérica. PubMed no tiene datos locales. Y el tiempo en guardia no espera.',
    },
    {
      type: 'agravante',
      name: 'Agravante',
      title: 'Y los vademécums impresos ya no son confiables.',
      body: 'La base de datos farmacéutica en Chile cambia constantemente. Una marca puede retirarse o cambiar concentración en meses.',
      question: '¿Con cuál versión estás trabajando tú?',
    },
    {
      type: 'solucion',
      name: 'Solución',
      title: 'Farmateca funciona 100% sin conexión.',
      body: 'Toda la información descargada en tu teléfono. Disponible en la guardia, en el campo, en cualquier lugar.',
    },
    {
      type: 'stats',
      name: 'Prueba · Stats',
      stitle: 'Respaldado por el ISP Chile.',
      stats: ['+200 compuestos', '+2.556 marcas', '34 familias farmacol.', '222 farmacias'],
      cite: 'Fuente: Registro Oficial ISP Chile · Base de datos v.2026.01',
    },
    {
      type: 'cta',
      name: 'CTA · Descarga',
      title: 'Descárgala hoy.',
      subtitle: 'Primeros 7 días Premium gratis.',
      legal: 'Se renueva automáticamente. Cancela cuando quieras desde App Store / Google Play.',
    },
  ];

  let current = 0;

  // ── RENDER CANVAS ─────────────────────────────────────────────────────────────
  function renderSlide(i) {
    const s = SLIDES[i];
    const canvas = document.getElementById('canvas');
    canvas.className = 'slide-canvas';

    if (s.type === 'hook') {
      canvas.innerHTML = `
        <div class="s-hook">
          <div class="slide-toprow">
            <div class="slide-num">0${i+1} / 06</div>
            <img class="slide-logo-sm" src="assets/logo-isotipo.png" alt="">
          </div>
          <div class="slide-body">
            <div class="sh-title">${esc(s.title)}</div>
            <div class="sh-sub">${esc(s.subtitle)}</div>
          </div>
          <div class="slide-bottom">
            <div class="swipe-hint">Desliza &nbsp;→</div>
          </div>
        </div>`;
    } else if (s.type === 'problema') {
      canvas.innerHTML = `
        <div class="s-problema">
          <div class="slide-toprow">
            <div class="slide-num">0${i+1} / 06</div>
          </div>
          <div class="slide-body">
            <div class="x-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </div>
            <div class="sp-title">${esc(s.title)}</div>
            <div class="sp-body">${esc(s.body)}</div>
          </div>
        </div>`;
    } else if (s.type === 'agravante') {
      canvas.innerHTML = `
        <div class="s-agravante">
          <div class="slide-toprow">
            <div class="slide-num">0${i+1} / 06</div>
          </div>
          <div class="slide-body">
            <div class="sa-title">${esc(s.title)}</div>
            <div class="sa-body">${esc(s.body)}</div>
            <div class="sa-question">${esc(s.question)}</div>
          </div>
        </div>`;
    } else if (s.type === 'solucion') {
      canvas.innerHTML = `
        <div class="s-solucion">
          <div class="slide-toprow">
            <div class="slide-num">0${i+1} / 06</div>
          </div>
          <div class="slide-body">
            <div class="check-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="ss-title">${esc(s.title)}</div>
            <div class="ss-body">${esc(s.body)}</div>
          </div>
        </div>`;
    } else if (s.type === 'stats') {
      const statsHtml = s.stats.map(st => {
        const m = st.match(/^([+\d\.]+)(.*)/);
        if (m) return `<div class="stat-item"><div class="stat-val">${esc(m[1])}</div><div class="stat-label">${esc(m[2].trim())}</div></div>`;
        return `<div class="stat-item"><div class="stat-val" style="font-size:42px">${esc(st)}</div></div>`;
      }).join('');
      canvas.innerHTML = `
        <div class="s-stats">
          <div class="slide-toprow">
            <div class="stats-title">${esc(s.stitle)}</div>
            <div class="slide-num" style="font-size:16px;margin-top:12px;">0${i+1} / 06</div>
          </div>
          <div class="stats-grid">${statsHtml}</div>
          <div class="stats-cite">${esc(s.cite)}</div>
        </div>`;
    } else if (s.type === 'cta') {
      canvas.innerHTML = `
        <div class="s-cta">
          <img class="slide-logo-big" src="assets/logo-full.png" alt="Farmateca">
          <div class="cta-center">
            <div class="cta-title">${esc(s.title)}</div>
            <div class="cta-sub">${esc(s.subtitle)}</div>
            <div class="badges">
              <img class="badge-img" src="assets/badge-appstore.png" alt="App Store">
              <img class="badge-img" src="assets/badge-googleplay.png" alt="Google Play">
            </div>
          </div>
          <div class="cta-legal">${esc(s.legal)}</div>
        </div>`;
    }

    document.getElementById('tb-count').textContent = `Slide ${i+1} / 6`;
    updateThumbs();
    renderEditPanel(i);
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── THUMBNAILS ────────────────────────────────────────────────────────────────
  const THUMB_BG = ['thumb-hook','thumb-problema','thumb-agravante','thumb-solucion','thumb-stats','thumb-cta'];
  const THUMB_LABEL_COLOR = ['#1e9db9','#9fa2a9','#1e9db9','rgba(255,255,255,.5)','#1e9db9','rgba(255,255,255,.5)'];

  function buildThumbs() {
    const el = document.getElementById('thumbs');
    el.innerHTML = SLIDES.map((s,i) => `
      <div class="thumb ${THUMB_BG[i]}" id="th-${i}" onclick="goTo(${i})">
        <div class="thumb-n" style="color:${THUMB_LABEL_COLOR[i]}">0${i+1}</div>
      </div>`).join('');
  }

  function updateThumbs() {
    document.querySelectorAll('.thumb').forEach((el,i) => el.classList.toggle('active', i === current));
  }

  // ── EDIT PANEL ────────────────────────────────────────────────────────────────
  function renderEditPanel(i) {
    const s = SLIDES[i];
    const el = document.getElementById('edit-area');
    let html = `<div class="p-section">Slide ${i+1} — ${s.name}</div><div class="p-slide-name">${s.type.charAt(0).toUpperCase()+s.type.slice(1)}</div>`;

    const fieldHtml = (id, label, val, isArea) => {
      if (isArea) return `<div class="field"><div class="f-label">${label}</div><textarea id="ef-${id}" oninput="updateField('${id}',this.value)">${val||''}</textarea></div>`;
      return `<div class="field"><div class="f-label">${label}</div><input id="ef-${id}" type="text" value="${(val||'').replace(/"/g,'&quot;')}" oninput="updateField('${id}',this.value)"></div>`;
    };

    if (s.type === 'hook') {
      html += fieldHtml('title', 'Título (grande)', s.title, false);
      html += fieldHtml('subtitle', 'Subtítulo', s.subtitle, true);
    } else if (s.type === 'problema') {
      html += fieldHtml('title', 'Título', s.title, false);
      html += fieldHtml('body', 'Cuerpo', s.body, true);
    } else if (s.type === 'agravante') {
      html += fieldHtml('title', 'Título', s.title, false);
      html += fieldHtml('body', 'Cuerpo', s.body, true);
      html += fieldHtml('question', 'Pregunta de cierre', s.question, false);
    } else if (s.type === 'solucion') {
      html += fieldHtml('title', 'Título', s.title, false);
      html += fieldHtml('body', 'Cuerpo', s.body, true);
    } else if (s.type === 'stats') {
      html += fieldHtml('stitle', 'Título', s.stitle, false);
      s.stats.forEach((st,j) => {
        html += `<div class="field"><div class="f-label">Stat ${j+1}</div><input id="ef-stat${j}" type="text" value="${(st||'').replace(/"/g,'&quot;')}" oninput="updateStat(${j},this.value)"></div>`;
      });
      html += fieldHtml('cite', 'Fuente', s.cite, false);
    } else if (s.type === 'cta') {
      html += fieldHtml('title', 'Título', s.title, false);
      html += fieldHtml('subtitle', 'Subtítulo', s.subtitle, false);
      html += fieldHtml('legal', 'Texto legal', s.legal, true);
    }

    html += `<hr><div class="export-note">Pide a Claude: <em>"Dame 3 variaciones del slide ${i+1} para un carrusel de Farmateca sobre [tema]."</em></div>`;
    el.innerHTML = html;
  }

  function updateField(key, val) {
    SLIDES[current][key] = val;
    renderSlide(current);
  }

  function updateStat(j, val) {
    SLIDES[current].stats[j] = val;
    renderSlide(current);
    // restore focus
    setTimeout(() => { const el = document.getElementById(`ef-stat${j}`); if(el){ el.focus(); const len=el.value.length; el.setSelectionRange(len,len); } }, 0);
  }

  // ── NAVIGATION ────────────────────────────────────────────────────────────────
  function goTo(i) {
    current = i;
    renderSlide(i);
    scaleCanvas();
  }

  function navigate(dir) {
    current = (current + dir + 6) % 6;
    goTo(current);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  });

  // ── SCALE ────────────────────────────────────────────────────────────────────
  function scaleCanvas() {
    const stage = document.getElementById('stage');
    const wrap  = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('canvas');
    const sw = stage.offsetWidth  - 44;
    const sh = stage.offsetHeight - 44;
    const scale = Math.min(sw / 1080, sh / 1080);
    canvas.style.transform = `scale(${scale})`;
    canvas.style.transformOrigin = 'top left';
    wrap.style.width  = (1080 * scale) + 'px';
    wrap.style.height = (1080 * scale) + 'px';
  }

  window.addEventListener('resize', scaleCanvas);

  // ── INIT ─────────────────────────────────────────────────────────────────────
  buildThumbs();
  renderSlide(0);
  scaleCanvas();
</script>
